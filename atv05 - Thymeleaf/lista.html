<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymouas">
  <title>Lista Produtos</title>
</head>

<body>
  <div class="container mt-5">
    <h1 class="display 5 mb-4">Lista de Produtos</h1>
    <div class="alert alert-info" role="alert" th:if="${#lists.isEmpty(produtos)}">
      Nenhum Produto Cadastrado Ainda
    </div>
    <table class="table table-striped" th:unless="${#lists.isEmpty(produtos)}">
      <thead>
        <th>#</th>
        <th>Nome</th>
        <th>Preço</th>
        <th>Categoria</th>
        <th>Descrição</th>
      <tbody>
        <tr th:each="produto, iterStat:${produtos}">
          <td th:text="${iterStat.count}">1</td>
          <td th:text="${produto.nome}">Nome</td>
          <td th:text="${produto.preco}">0,00</td>
          <td th:text="${produto.categoria}">Categoria</td>
          <td th:text="${produto.quantidadeEstoque}">Quantidade em Estoque</td>
          <td th:text="${produto.descricao}">Descricao</td>
        </tr>
      </tbody>
      </thead>
    </table>
    <a class="btn tbn-primary" href="/cadastrar">Cadastrar Novo Produto</a>
    <p>Total de produtos cadastrados: <span th:text="${produtos.size}">0</span></p>
  </div>
</body>

</html>
