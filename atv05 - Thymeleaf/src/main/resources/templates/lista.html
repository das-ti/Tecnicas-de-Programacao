<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" th:href="@{/style.css}" />
  <title>Lista Produtos</title>
</head>

<body>
  <div class="container mt-5" id="card-container">
    <h1 class="display-6 mt-4">Lista de Produtos</h1>
    <div class="alert alert-primary" role="alert" th:if="${#lists.isEmpty(produtos)}">
      Nenhum Produto Cadastrado Ainda
    </div>
    <table class="table table-striped" th:unless="${#lists.isEmpty(produtos)}">
      <thead>
        <th>#</th>
        <th>Nome</th>
        <th>Categoria</th>
        <th>Descrição</th>
        <th>Estoque</th>
        <th>Preço</th>
        <th>Ações</th>
      <tbody>
        <tr th:each="produto, iterStat:${produtos}">
          <td th:text="${iterStat.count}">1</td>
          <td th:text="${produto.nome}">Nome</td>
          <td th:text="${produto.categoria}">Categoria</td>
          <td th:text="${produto.descricao}">Descrição</td>
          <td th:text="${produto.estoque}">Estoque</td>
          <td th:text="${produto.preco}">0,00</td>
          <td>
            <form th:action="@{/remover/{i}(i=${iterStat.index})}" method="post">
              <button type="submit" class="btn btn-danger">Remover</button>
            </form>           
          </td>
        </tr>
      </tbody>
      </thead>
            <tfoot>
          <tr>
              <td colspan="7"><strong>Produtos cadastrados: <span th:text="${produtos.size}">0</span></td>
          </tr>
      </tfoot>
    </table>
    <div class="last-line"><a class="btn btn-primary" role="button" href="/cadastrar">Cadastrar Novo Produto</a>
    </div>
  </div>
</body>

</html>
