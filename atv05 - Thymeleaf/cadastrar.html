<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous" />
  <title>Cadastrar Produto</title>
</head>

<body>
  <div class="container mt-5">
    <h1 class="display-3 mt-4">Cadastrar Produto</h1>
    <form th:action="@{/cadastrar}" th:object="${produto}" method="post">
      <div class="form-group">
        <label for="nome">Nome</label>
        <input class="form-control" type="text" th:field="*{nome}" placeholder="Ex. Camiseta" required />
        <span th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}" style="color:red;"></span>
      </div>
      <div class="form-group">
        <label for="preco">Preço</label>
        <input class="form-control" type="number" min="0" th:field="*{preco}" placeholder="Ex. 100.00" required />
        <span th:if="${#fields.hasErrors('preco')}" th:errors="*{preco}" style="color:red;"></span>
      </div>
      <div class="form-group">
        <label for="categoria">Categoria</label>
        <select class="form-control" name="selectCategoria" th:field="*{categoria}" required>
          <option value="" selected>Selecione</option>
          <option value="Eletronico">Eletrônico</option>
          <option value="Vestuario">Vestuário</option>
          <option value="Alimentos">Alimentos</option>
          <option value="Bazar">Bazar</option>
        </select>
      </div>
      <div>
        <label for="estoque">Estoque:</label>
        <input class="form-control" type="number" th:field="*{estoque}" min="0" />
        <span th:if="${#fields.hasErrors('estoque')}" th:errors="*{estoque}" style="color:red;"></span>
      </div>
      <div>
        <label for="descricao">Descrição</label>
        <textarea class="form-control" th:field="*{descricao}" placeholder="Ex. Informaçoes sobre o produto..."
          required></textarea>
      </div><br>
      <button class="btn btn-primary" type="submit">Cadastrar</button>
      <a class="btn btn-secondary" href="/lista">Lista de Produtos</a>
    </form>
  </div>
  </div>
</body>

</html>
