<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" th:href="@{/style.css}" />  
  <title>Cadastrar Produto</title>
</head>

<body>
  <div class="container mt-3" id="card-container">
    <h1 class="display-5 mt-4">Cadastrar Produto</h1>
    <form th:action="@{/cadastrar}" th:object="${produto}" method="post">
      <div class="form-group">
        <label for="nome">Nome</label>
        <input class="form-control" type="text" th:field="*{nome}" placeholder="Ex. Camiseta" required />
        <span th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}" style="color:red;"></span>
      </div>

      <div class="form-group">
        <label for="categoria">Categoria</label>
        <select class="form-control" name="selectCategoria" th:field="*{categoria}" required>
          <option value="" selected>Selecione</option>
          <option value="Eletronico">Eletrônico</option>
          <option value="Vestuario">Vestuário</option>
          <option value="Alimentos">Alimentos</option>
          <option value="Bazar">Bazar</option>
        </select>
      </div>
      <div>
        <label for="descricao">Descrição</label>
        <input class="form-control" type="text" th:field="*{descricao}" placeholder="Ex. Informações do produto..."
        required>
      </input>
      <div class="container-inputs">
        <div class="two-inputs">
          <label for="estoque">Estoque:</label>
          <input class="form-control" id="estoque" type="number" th:field="*{estoque}" min="0" />
          <span th:if="${#fields.hasErrors('estoque')}" th:errors="*{estoque}" style="color:red;"></span>
        </div>
        <div class="two-inputs">
          <label for="preco">Preço:</label>
          <input class="form-control" id="preco" type="number" th:field="*{preco}" placeholder="Ex. 100.00" required />
          <span th:if="${#fields.hasErrors('preco')}" th:errors="*{preco}"></span>
        </div>
      </div><br>
      <button class="btn btn-primary" type="submit">Cadastrar</button>
      <a class="btn btn-secondary" href="/lista">Lista de Produtos</a>
    </form>
  </div>
  </div>
</body>

</html>
