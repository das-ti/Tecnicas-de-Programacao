<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Previsão do Tempo</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 450px;
        margin: auto;
      }
      main {
        width:500px;
        height: 610px;
        background-color: #f5f4fc;
        text-align: center;
        border-radius: 10px;
      }
      section {
        display: flex;
        justify-content: center;
      }
      input {
        padding: 8px;
        width: 60%;
        font-size: 16px;
        margin: 4px 0;
      }
      button {
        padding: 8px 16px;
        background: #ece4e4;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 4px;
        cursor: pointer;
      }
      button[type="submit"] {
        width: 200px;
        font-size:18px;
      }
      button[type="submit"]:hover {
        background: #69f0c3;
        border: 1px solid #020629;
      }
      .cidades {
        width: 420px;
        margin: 10px auto;
      }
      .cidades button {
        width: 150px;
        margin: 4px;
      }
      .cidades button:hover {
        background: #cfe0f5;
        border: 1px solid #020629;
      }
      .erro {
        color: red;
        margin-top: 12px;
      }
    </style>
    <script>
      function preencherCidade(lat, lon) {
        document.getElementById("latitude").value = lat;
        document.getElementById("longitude").value = lon;
      }
    </script>
  </head>
  <body>
    <main>
      <h1>🌤️ Previsão do Tempo</h1>

      <p>Escolha uma cidade:</p>

      <section>
        <div class="cidades">
          <button type="button" onclick="preencherCidade('-23.85', '-45.97')">
            Bertioga
          </button>
          <button type="button" onclick="preencherCidade('-23.87', '-46.42')">
            Cubatão
          </button>
          <button type="button" onclick="preencherCidade('-23.93', '-46.18')">
            Guarujá
          </button>
          <button type="button" onclick="preencherCidade('-24.18', '-46.79')">
            Itanhaém
          </button>
          <button type="button" onclick="preencherCidade('-24.09', '-46.62')">
            Mongaguá
          </button>
          <button type="button" onclick="preencherCidade('-24.32', '-47.00')">
            Peruíbe
          </button>
          <button type="button" onclick="preencherCidade('-24.00', '-46.40')">
            Praia Grande
          </button>
          <button type="button" onclick="preencherCidade('-23.96', '-46.33')">
            Santos
          </button>
          <button type="button" onclick="preencherCidade('-23.55', '-46.63')">
            São Paulo
          </button>
          <button type="button" onclick="preencherCidade('-23.98', '-46.25')">
            São Vicente
          </button>
        </div>
      </section>

      <p>Se preferir, digite as coordenadas.</p>

      <form action="/buscar" method="post">
        <label>Latitude:</label><br />
        <input
          type="text"
          id="latitude"
          name="latitude"
          placeholder="Ex: -23.55"
          required
        /><br />

        <label>Longitude:</label><br />
        <input
          type="text"
          id="longitude"
          name="longitude"
          placeholder="Ex: -46.63"
          required
        /><br /><br />

        <button type="submit">Buscar Clima</button>
      </form>

      <div th:if="${erro}">
        <p class="erro" th:text="${erro}"></p>
      </div>
    </main>
  </body>
</html>
